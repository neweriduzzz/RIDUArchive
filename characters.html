<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>에이전트 도감</title>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #b9bec4; /* 도련님 사이트의 깔끔한 연회색 배경 */
            color: #333333;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #ffffff;
            background-color: #3b4856; /* 상단 타이틀 바 색상 */
            margin: -20px -20px 20px -20px;
            padding: 15px;
            font-size: 24px;
        }
        /* 필터 및 검색 레이아웃 */
        .filter-search-container {
            max-width: 600px;
            margin: 0 auto 20px auto;
            background-color: #cbd1d6;
            padding: 15px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .filter-row {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .search-box {
            display: flex;
            align-items: center;
            background-color: #4a5563;
            padding: 5px 10px;
            border-radius: 4px;
            margin-left: auto;
        }
        .search-box input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 80px;
            font-size: 14px;
        }
        .search-box input::placeholder {
            color: #9ca3af;
        }
        /* 필터 버튼 스타일 */
        .filter-btn {
            background-color: #4a5563;
            border: none;
            border-radius: 4px;
            padding: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
        }
        .filter-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .filter-btn.active {
            background-color: #ffcc00; /* 활성화된 버튼 노란색 */
        }
        .filter-text-btn {
            background-color: #ffcc00;
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            font-weight: bold;
            cursor: pointer;
            height: 36px;
        }
        
        /* ----------------------------------------- */
        /* 도련님이 요청하신 캐릭터 카드 스타일 최적화 */
        /* ----------------------------------------- */
        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px;
            max-width: 600px;
            margin: 0 auto;
        }
        .character-card {
            background-color: transparent;
            border-radius: 0; /* 강제로 모서리를 깎지 않아 원본의 검은 테두리가 칼같이 살아납니다 */
            overflow: hidden;
            cursor: pointer;
            display: block;
        }
        .character-card img {
            width: 100%;
            height: auto; /* 이미지 고유 비율을 완벽하게 유지 */
            display: block;
            border-radius: 0;
        }
    </style>
</head>
<body>

    <h1>에이전트</h1>

    <!-- 필터 및 검색 섹션 -->
    <div class="filter-search-container">
        <!-- 속성 필터 -->
        <div class="filter-row">
            <button class="filter-text-btn" onclick="filterAttribute('all', this)">전체</button>
            <button class="filter-btn" onclick="filterAttribute('Ether', this)"><img src="Ether.png" alt="에테르"></button>
            <button class="filter-btn" onclick="filterAttribute('Electric', this)"><img src="Electric.png" alt="전기"></button>
            <button class="filter-btn" onclick="filterAttribute('Physical', this)"><img src="Physical.png" alt="물리"></button>
            <button class="filter-btn" onclick="filterAttribute('Ice', this)"><img src="Ice.png" alt="얼음"></button>
            <button class="filter-btn" onclick="filterAttribute('Fire', this)"><img src="Fire.png" alt="불"></button>
            <button class="filter-btn" onclick="filterAttribute('Wind', this)"><img src="Wind.png" alt="바람"></button>
            
            <!-- 검색창 -->
            <div class="search-box">
                <input type="text" placeholder="검색...">
                <span>🔍</span>
            </div>
        </div>
        <!-- 특성 필터 -->
        <div class="filter-row">
            <button class="filter-btn" onclick="filterJob('Attack', this)"><img src="Attack.png" alt="강공"></button>
            <button class="filter-btn" onclick="filterJob('Anomaly', this)"><img src="Anomaly.png" alt="이상"></button>
            <button class="filter-btn" onclick="filterJob('Rupture', this)"><img src="Rupture.png" alt="명파"></button>
            <button class="filter-btn" onclick="filterJob('Stun', this)"><img src="Stun.png" alt="격파"></button>
            <button class="filter-btn" onclick="filterJob('Defense', this)"><img src="Defense.png" alt="방어"></button>
            <button class="filter-btn" onclick="filterJob('Support', this)"><img src="Support.png" alt="지원"></button>
        </div>
    </div>

    <!-- 캐릭터 그리드 (하단 중복 이름 박스를 완전히 제거) -->
    <div class="character-grid" id="characterGrid">
        <!-- 이블린 카드 -->
        <div class="character-card" data-attribute="Fire" data-job="Attack">
            <img src="Evelyn.png" alt="이블린">
        </div>

        <!-- 오르피 카드 -->
        <div class="character-card" data-attribute="Fire" data-job="Attack">
            <img src="Orphy.png" alt="오르피">
        </div>

        <!-- 11호 카드 -->
        <div class="character-card" data-attribute="Fire" data-job="Attack">
            <img src="No11.png" alt="11호">
        </div>
    </div>

    <script>
        let currentAttribute = 'all';
        let currentJob = 'all';

        function filterAttribute(attr, btn) {
            currentAttribute = attr;
            applyFilters();
        }

        function filterJob(job, btn) {
            currentJob = job;
            applyFilters();
        }

        function applyFilters() {
            const cards = document.querySelectorAll('.character-card');
            
            cards.forEach(card => {
                const attrMatch = (currentAttribute === 'all' || card.getAttribute('data-attribute') === currentAttribute);
                const jobMatch = (currentJob === 'all' || card.getAttribute('data-job') === currentJob);
                
                if (attrMatch && jobMatch) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
