<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>에이전트 도감</title>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        h1 { text-align: center; color: #ffcc00; margin-bottom: 30px; }

        /* 필터 섹션 */
        .filter-container { max-width: 1200px; margin: 0 auto 30px auto; background-color: #1e1e1e; padding: 20px; border-radius: 12px; }
        .filter-group { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .filter-label { font-weight: bold; min-width: 60px; color: #aaaaaa; }
        .filter-btn { display: flex; align-items: center; gap: 8px; background-color: #2a2a2a; border: 2px solid #3a3a3a; border-radius: 8px; padding: 8px 14px; color: #ffffff; cursor: pointer; }
        .filter-btn.active { background-color: #ffcc00; color: #000000; font-weight: bold; }
        #searchInput { width: 100%; max-width: 1200px; margin: 0 auto; display: block; padding: 10px; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 6px; }

        /* 그리드 및 카드 */
        .character-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; max-width: 1200px; margin: 20px auto; }
        .character-card { background-color: #1e1e1e; border-radius: 12px; overflow: hidden; border: 1px solid #2d2d2d; transition: transform 0.2s; }
        .character-card:hover { transform: translateY(-5px); border-color: #ffcc00; }
        
        /* 이미지 영역: 이름 박스 제거됨 */
        .char-img-container { width: 100%; }
        .char-img-container img { width: 100%; display: block; }
    </style>
</head>
