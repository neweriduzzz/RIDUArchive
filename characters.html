<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIDUArchive - 에이전트</title>
    <style>
        body {
            background-color: #d1d5db; /* 인게임 느낌의 연한 회색 배경 */
            color: #000000;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 최상단 타이틀 바 */
        .top-header {
            background-color: #4b5563; /* 어두운 회색 바 */
            width: 100%;
            text-align: center;
            padding: 10px 0;
        }
        .top-header h1 {
            color: #ffffff;
            margin: 0;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* 필터 및 검색창 컨테이너 */
        .menu-container {
            width: 100%;
            max-width: 450px;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        /* 아이콘 필터 영역 */
        .filter-section {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .filter-row {
            display: flex;
            gap: 4px;
        }
        .filter-btn {
            background: none;
            border: 2px solid transparent;
            padding: 0;
            cursor: pointer;
            border-radius: 4px;
        }
        .filter-btn img {
            width: 32px;
            height: 32px;
            display: block;
        }
        .filter-btn.active {
            border-color: #ffaa00;
            background-color: rgba(255, 170, 0, 0.2);
        }

        /* 검색창 영역 */
        .search-box {
            position: relative;
            display: flex;
            align-items: center;
            background-color: #374151;
            border: 2px solid #1f2937;
            padding: 4px 8px;
            width: 150px;
        }
        .search-box input {
            background: none;
            border: none;
            color: #ffffff;
            width: 100%;
            font-size: 14px;
            font-weight: bold;
            outline: none;
        }
        .search-box input::placeholder {
            color: #9ca3af;
        }
        .search-box .search-icon {
            color: #ffffff;
            font-size: 14px;
            margin-left: 5px;
            cursor: pointer;
        }

        /* 캐릭터 그리드 (도련님 이미지 비율에 맞춘 3열 배치) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 450px;
            padding: 10px;
            box-sizing: border-box;
        }

        /* 캐릭터 카드 스타일 (검은색 두꺼운 테두리 및 라운딩) */
        .card {
            background-color: #ffffff;
            border: 3px solid #000000;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 캐릭터 이름 영역 */
        .card-name {
            padding: 6px 8px;
            font-size: 14px;
            font-weight: bold;
            background-color: #ffffff;
            border-top: 2px solid #e5e7eb;
            text-align: left;
        }
         .card-name { display: none; }
    </style>
</head>
<body>

    <!-- 최상단 타이틀 바 -->
    <div class="top-header">
        <h1>에이전트</h1>
    </div>

    <!-- 메뉴 영역 -->
    <div class="menu-container">
        <!-- 좌측: 도련님이 정렬하신 아이콘 배열 그대로 구성 -->
        <div class="filter-section">
            <!-- 1행 속성: 에테르, 번개, 물리, 얼음, 불, 바람 -->
            <div class="filter-row">
                <button class="filter-btn" onclick="toggleFilter('Ether')"><img src="Ether.png" alt="에테르"></button>
                <button class="filter-btn" onclick="toggleFilter('Electric')"><img src="Electric.png" alt="번개"></button>
                <button class="filter-btn" onclick="toggleFilter('Physical')"><img src="Physical.png" alt="물리"></button>
                <button class="filter-btn" onclick="toggleFilter('Ice')"><img src="Ice.png" alt="얼음"></button>
                <button class="filter-btn" onclick="toggleFilter('Fire')"><img src="Fire.png" alt="불"></button>
                <button class="filter-btn" onclick="toggleFilter('Wind')"><img src="Wind.png" alt="바람"></button>
            </div>
            <!-- 2행 특성: 강공, 이상, 지원, 격파, 방어, 파멸 -->
            <div class="filter-row">
                <button class="filter-btn" onclick="toggleFilter('Attack')"><img src="Attack.png" alt="강공"></button>
                <button class="filter-btn" onclick="toggleFilter('Anomaly')"><img src="Anomaly.png" alr=이상"></button>
                <button class="filter-btn" onclick="toggleFilter('Support')"><img src="Support.png" alt="지원"></button>
                <button class="filter-btn" onclick="toggleFilter('Stun')"><img src="Stun.png" alt="격파"></button>
                <button class="filter-btn" onclick="toggleFilter('Defense')"><img src="Defense.png" alt="방어"></button>
                <button class="filter-btn" onclick="toggleFilter('Rupture')"><img src="Rupture.png" alt="명파"></button>
            </div>
        </div>

        <!-- 우측: 검색창 -->
        <div class="search-box">
            <input type="text" id="searchInput" oninput="filterCharacters()" placeholder="검색...">
            <span class="search-icon">🔍</span>
        </div>
    </div>
<div class="grid-container" id="characterGrid"> </div>
    </div>


<script src="script.js"></script>
</body>
</html>
