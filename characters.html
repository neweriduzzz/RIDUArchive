<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIDUArchive - 에이전트</title>
    <style>
        body {
            background-color: #d1d5db;
            color: #000000;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .top-header {
            background-color: #4b5563;
            width: 100%;
            text-align: center;
            padding: 10px 0;
        }
        .top-header h1 {
            color: #ffffff;
            margin: 0;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .menu-container {
            width: 100%;
            max-width: 450px;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }
        .filter-section {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .filter-row {
            display: flex;
            gap: 4px;
        }
        .filter-btn {
            background: none;
            border: 2px solid transparent;
            padding: 0;
            cursor: pointer;
            border-radius: 4px;
        }
        .filter-btn img {
            width: 32px;
            height: 32px;
            display: block;
        }
        .filter-btn.active {
            border-color: #ffaa00;
            background-color: rgba(255, 170, 0, 0.2);
        }
        .search-box {
            position: relative;
            display: flex;
            align-items: center;
            background-color: #374151;
            border: 2px solid #1f2937;
            padding: 4px 8px;
            width: 150px;
        }
        .search-box input {
            background: none;
            border: none;
            color: #ffffff;
            width: 100%;
            font-size: 14px;
            font-weight: bold;
            outline: none;
        }
        .search-box input::placeholder {
            color: #9ca3af;
        }
        .search-box .search-icon {
            color: #ffffff;
            font-size: 14px;
            margin-left: 5px;
            cursor: pointer;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 450px;
            padding: 10px;
            box-sizing: border-box;
        }
        .card {
            background-color: #ffffff;
            border: 3px solid #000000;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card img {
            width: 100%;
            height: auto;
            display: block;
        }
        .card-name {
            padding: 6px 8px;
            font-size: 14px;
            font-weight: bold;
            background-color: #ffffff;
            border-top: 2px solid #e5e7eb;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="top-header">
        <h1>에이전트</h1>
    </div>

    <div class="menu-container">
        <div class="filter-section">
            <div class="filter-row">
                <button class="filter-btn" onclick="toggleFilter('Ether')"><img src="Ether.png" alt="에테르"></button>
                <button class="filter-btn" onclick="toggleFilter('Electric')"><img src="Electric.png" alt="번개"></button>
                <button class="filter-btn" onclick="toggleFilter('Physical')"><img src="Physical.png" alt="물리"></button>
                <button class="filter-btn" onclick="toggleFilter('Ice')"><img src="Ice.png" alt="얼음"></button>
                <button class="filter-btn" onclick="toggleFilter('Fire')"><img src="Fire.png" alt="불"></button>
                <button class="filter-btn" onclick="toggleFilter('Wind')"><img src="Wind.png" alt="바람"></button>
            </div>
            <div class="filter-row">
                <!-- 엑박 오류 수정: src="Anomaly.png" 추가 완료! -->
                <button class="filter-btn" onclick="toggleFilter('Attack')"><img src="Attack.png" alt="강공"></button>
                <button class="filter-btn" onclick="toggleFilter('Anomaly')"><img src="Anomaly.png" alt="이상"></button>
                <button class="filter-btn" onclick="toggleFilter('Support')"><img src="Support.png" alt="지원"></button>
                <button class="filter-btn" onclick="toggleFilter('Stun')"><img src="Stun.png" alt="격파"></button>
                <button class="filter-btn" onclick="toggleFilter('Defense')"><img src="Defense.png" alt="방어"></button>
                <button class="filter-btn" onclick="toggleFilter('Rupture')"><img src="Rupture.png" alt="파멸"></button>
            </div>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" oninput="filterCharacters()" placeholder="검색...">
            <span class="search-icon">🔍</span>
        </div>
    </div>

    <div class="grid-container" id="characterGrid">
        <!-- 판정 수정: 세 캐릭터 모두 Fire(불) / Attack(강공)으로 세팅 완료! -->
        <div class="card" data-name="이블린" data-attribute="Fire" data-job="Attack">
            <img src="Evelyn.png" alt="이블린">
            <div class="card-name">이블린</div>
        </div>

        <div class="card" data-name="오르피" data-attribute="Fire" data-job="Attack">
            <img src="Orphie_Magus.png" alt="오피">
            <div class="card-name">오르피&...</div>
        </div>

        <div class="card" data-name="11호" data-attribute="Fire" data-job="Attack">
            <img src="Soldier11.png" alt="11호">
            <div class="card-name">「11호」</div>
        </div>
    </div>

    <script>
        let activeAttribute = null;
        let activeJob = null;

        function toggleFilter(type) {
            const attributes = ['Ether', 'Electric', 'Physical', 'Ice', 'Fire', 'Wind'];
            const jobs = ['Attack', 'Anomaly', 'Support', 'Stun', 'Defense', 'Rupture'];
            const eventTarget = event.currentTarget;

            if (attributes.includes(type)) {
                if (activeAttribute === type) {
                    activeAttribute = null;
                    eventTarget.classList.remove('active');
                } else {
                    document.querySelectorAll('.filter-row:first-child .filter-btn').forEach(b => b.classList.remove('active'));
                    activeAttribute = type;
                    eventTarget.classList.add('active');
                }
            } else if (jobs.includes(type)) {
                if (activeJob === type) {
                    activeJob = null;
                    eventTarget.classList.remove('active');
                } else {
                    document.querySelectorAll('.filter-row:last-child .filter-btn').forEach(b => b.classList.remove('active'));
                    activeJob = type;
                    eventTarget.classList.add('active');
                }
            }

            filterCharacters();
        }

        function filterCharacters() {
            const cards = document.querySelectorAll('.card');
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            
            cards.forEach(card => {
                const cardName = card.getAttribute('data-name').toLowerCase();
                const cardAttr = card.getAttribute('data-attribute');
                const cardJob = card.getAttribute('data-job');
                let show = true;
                
                if (activeAttribute && cardAttr !== activeAttribute) show = false;
                if (activeJob && cardJob !== activeJob) show = false;
                if (searchText && !cardName.includes(searchText)) show = false;
                
                if (show) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
