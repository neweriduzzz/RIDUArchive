<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIDUArchive</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .main-container {
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        p {
            color: #9ca3af;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .enter-btn {
            display: inline-block;
            background-color: #ffaa00;
            color: #000000;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            padding: 15px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
        }
        .enter-btn:hover {
            transform: scale(1.05);
            background-color: #ffbb33;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>리두보관소</h1>
        <p>리두보관소에 오신 것을 환영합니다</p>
        
        <!-- 이 버튼을 누르면 characters.html로 이동합니다! -->
        <a href="characters.html" class="enter-btn">에이전트</a>
    </div>

</body>
</html>
